<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Умный калькулятор</title>
    <style>
        * {
            transition: all 0.3s ease;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }
        
        .calculator {
            background: white;
            border-radius: 20px;
            padding: 25px;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        h1 {
            text-align: center;
            margin: 0 0 20px 0;
            font-size: 24px;
            color: #333;
        }
        
        .display {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #e94560;
            font-family: monospace;
            min-height: 60px;
        }
        
        input {
            width: calc(50% - 12px);
            padding: 12px;
            margin: 5px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 16px;
            box-sizing: border-box;
        }
        
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        
        button {
            padding: 15px;
            font-size: 18px;
            background: #e0e0e0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        
        button:hover {
            background: #d0d0d0;
            transform: scale(1.02);
        }
        
        .special-btn {
            background: #ffd966;
        }
        
        .special-btn:hover {
            background: #ffcc33;
        }
        
        .result {
            margin-top: 15px;
            padding: 12px;
            background: #e94560;
            color: white;
            border-radius: 10px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }
        
        .clear-btn {
            width: 100%;
            margin-top: 10px;
            background: #ff6b6b;
            color: white;
        }
        
        .memory-panel {
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 10px;
        }
        
        .memory-panel h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #666;
        }
        
        .memory-list {
            min-height: 50px;
            max-height: 150px;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        
        .memory-item {
            background: white;
            padding: 8px;
            margin: 5px 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }
        
        .memory-item button {
            padding: 5px 10px;
            font-size: 12px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .save-memory-btn {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .clear-memory-btn {
            width: 100%;
            margin-top: 8px;
            padding: 8px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .theme-panel {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        
        .theme-option {
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            border: 2px solid transparent;
        }
        
        .theme-option:hover {
            transform: scale(1.05);
        }
        
        body.theme-dark {
            background: #1a1a2e;
        }
        body.theme-dark .calculator {
            background: #16213e;
        }
        body.theme-dark h1 {
            color: #e0e0e0;
        }
        body.theme-dark .display {
            background: #0f3460;
            color: #e94560;
        }
        body.theme-dark input {
            background: #0f3460;
            color: white;
            border-color: #e94560;
        }
        body.theme-dark button {
            background: #0f3460;
            color: white;
        }
        body.theme-dark .special-btn {
            background: #e94560;
        }
        body.theme-dark .memory-panel {
            background: #0f3460;
        }
        body.theme-dark .memory-item {
            background: #1a1a2e;
            color: white;
        }
        
        body.theme-blue {
            background: #e3f2fd;
        }
        body.theme-blue .calculator {
            background: #bbdef5;
        }
        body.theme-blue h1 {
            color: #0d47a1;
        }
        body.theme-blue .display {
            background: #1976d2;
            color: white;
        }
        body.theme-blue button {
            background: #1976d2;
            color: white;
        }
        body.theme-blue .special-btn {
            background: #ffd966;
            color: #333;
        }
        body.theme-blue .memory-panel {
            background: #e3f2fd;
        }
        body.theme-blue .memory-item {
            background: white;
            color: #0d47a1;
        }
        
        body.theme-pink {
            background: #fce4ec;
        }
        body.theme-pink .calculator {
            background: #f8bbd0;
        }
        body.theme-pink h1 {
            color: #880e4f;
        }
        body.theme-pink .display {
            background: #e91e63;
            color: white;
        }
        body.theme-pink button {
            background: #e91e63;
            color: white;
        }
        body.theme-pink .special-btn {
            background: #ffd966;
            color: #333;
        }
        body.theme-pink .memory-panel {
            background: #fce4ec;
        }
        body.theme-pink .memory-item {
            background: white;
            color: #880e4f;
        }
    </style>
</head>
<body class="theme-light">
    <div class="calculator">
        <h1>🧮 Умный калькулятор</h1>
        
        <div class="theme-panel">
            <div class="theme-option" style="background:#f5f5f5;color:#333;border-color:#ddd;" onclick="setTheme('light')">☀️ Светлая</div>
            <div class="theme-option" style="background:#1a1a2e;color:white;border-color:#e94560;" onclick="setTheme('dark')">🌙 Тёмная</div>
            <div class="theme-option" style="background:#1976d2;color:white;border-color:#0d47a1;" onclick="setTheme('blue')">💙 Синяя</div>
            <div class="theme-option" style="background:#e91e63;color:white;border-color:#880e4f;" onclick="setTheme('pink')">💗 Розовая</div>
        </div>
        
        <div class="display" id="display">✨ Готов к работе</div>
        
        <input type="number" id="num1" placeholder="Первое число">
        <input type="number" id="num2" placeholder="Второе число">
        
        <div class="buttons">
            <button onclick="calculate('+')">+</button>
            <button onclick="calculate('-')">-</button>
            <button onclick="calculate('*')">×</button>
            <button onclick="calculate('/')">÷</button>
            <button class="special-btn" onclick="calculatePercent()">%</button>
            <button class="special-btn" onclick="calculateSquare()">x²</button>
            <button class="special-btn" onclick="calculateSqrt()">√</button>
        </div>
        
        <button class="clear-btn" onclick="clearAll()">🗑️ Очистить всё</button>
        
        <div class="result" id="result">Результат: —</div>
        
        <div class="memory-panel">
            <h3>📌 Сохранённые результаты</h3>
            <div class="memory-list" id="memoryList">
                <div style="color: #999; text-align: center;">Пока пусто</div>
            </div>
            <button class="save-memory-btn" onclick="saveToMemory()">💾 Запомнить результат</button>
            <button class="clear-memory-btn" onclick="clearMemory()">🗑️ Очистить всю память</button>
        </div>
    </div>

    <script>
        let memory = [];
        
        // Функция проверки, заполнены ли поля
        function areNumbersValid(num1, num2, needBoth = true) {
            if (needBoth) {
                if (isNaN(num1) || isNaN(num2)) {
                    document.getElementById('display').innerHTML = '⌨️ Введите оба числа';
                    return false;
                }
            } else {
                if (isNaN(num1)) {
                    document.getElementById('display').innerHTML = '⌨️ Введите число';
                    return false;
                }
            }
            return true;
        }
        
        // Основные операции
        function calculate(op) {
            let a = parseFloat(document.getElementById('num1').value);
            let b = parseFloat(document.getElementById('num2').value);
            let res;
            let operationText = '';
            let operationSymbol = '';
            
            // Проверка на пустые поля - просто показываем подсказку, НЕ ошибку
            if (!areNumbersValid(a, b, true)) {
                return;
            }
            
            if (op === '/' && b === 0) {
                document.getElementById('result').innerHTML = '❌ Ошибка: деление на ноль!';
                document.getElementById('display').innerHTML = '⛔ Деление на 0 запрещено';
                return;
            }
            
            if (op === '+') { res = a + b; operationText = 'сложение'; operationSymbol = '+'; }
            if (op === '-') { res = a - b; operationText = 'вычитание'; operationSymbol = '-'; }
            if (op === '*') { res = a * b; operationText = 'умножение'; operationSymbol = '×'; }
            if (op === '/') { res = a / b; operationText = 'деление'; operationSymbol = '÷'; }
            
            document.getElementById('display').innerHTML = `${a} ${operationSymbol} ${b} = ${res}`;
            document.getElementById('result').innerHTML = `✅ Результат (${operationText}): ${res}`;
        }
        
        // Проценты
        function calculatePercent() {
            let a = parseFloat(document.getElementById('num1').value);
            let b = parseFloat(document.getElementById('num2').value);
            
            if (!areNumbersValid(a, b, true)) {
                return;
            }
            
            let res = (a * b) / 100;
            document.getElementById('display').innerHTML = `${a}% от ${b} = ${res}`;
            document.getElementById('result').innerHTML = `✅ ${a}% от ${b} = ${res}`;
        }
        
        // Возведение в квадрат
        function calculateSquare() {
            let a = parseFloat(document.getElementById('num1').value);
            
            if (!areNumbersValid(a, 0, false)) {
                return;
            }
            
            let res = a * a;
            document.getElementById('display').innerHTML = `${a}² = ${res}`;
            document.getElementById('result').innerHTML = `✅ Квадрат числа ${a} = ${res}`;
        }
        
        // Квадратный корень
        function calculateSqrt() {
            let a = parseFloat(document.getElementById('num1').value);
            
            if (!areNumbersValid(a, 0, false)) {
                return;
            }
            
            if (a < 0) {
                document.getElementById('result').innerHTML = '❌ Ошибка: корень из отрицательного числа!';
                document.getElementById('display').innerHTML = '⛔ Невозможно';
                return;
            }
            
            let res = Math.sqrt(a);
            document.getElementById('display').innerHTML = `√${a} = ${res}`;
            document.getElementById('result').innerHTML = `✅ Квадратный корень из ${a} = ${res}`;
        }
        
        function clearAll() {
            document.getElementById('num1').value = '';
            document.getElementById('num2').value = '';
            document.getElementById('result').innerHTML = 'Результат: —';
            document.getElementById('display').innerHTML = '✨ Готов к работе';
        }
        
        function saveToMemory() {
            let resultText = document.getElementById('result').innerHTML;
            let match = resultText.match(/\d+\.?\d*/);
            
            if (match && resultText !== 'Результат: —' && !resultText.includes('Ошибка') && !resultText.includes('сохранён')) {
                let value = parseFloat(match[0]);
                let now = new Date();
                let timeString = now.toLocaleTimeString();
                
                memory.push({ value: value, time: timeString });
                document.getElementById('result').innerHTML = `💾 Результат ${value} сохранён в память (${timeString})!`;
                document.getElementById('display').innerHTML = `📌 Сохранено: ${value}`;
                updateMemoryDisplay();
            } else if (resultText.includes('Ошибка')) {
                document.getElementById('display').innerHTML = '⚠️ Нельзя сохранить ошибку';
            } else {
                document.getElementById('display').innerHTML = '❌ Нет результата для сохранения';
            }
        }
        
        function updateMemoryDisplay() {
            let container = document.getElementById('memoryList');
            if (memory.length === 0) {
                container.innerHTML = '<div style="text-align: center;">Пока пусто</div>';
                return;
            }
            container.innerHTML = '';
            for (let i = 0; i < memory.length; i++) {
                let item = document.createElement('div');
                item.className = 'memory-item';
                item.innerHTML = `
                    <span>📊 ${memory[i].value} (${memory[i].time})</span>
                    <button onclick="useMemoryItem(${i})">Использовать</button>
                `;
                container.appendChild(item);
            }
        }
        
        function useMemoryItem(index) {
            let val = memory[index].value;
            document.getElementById('result').innerHTML = `📋 Использовано: ${val}`;
            document.getElementById('display').innerHTML = `📋 Загружено: ${val}`;
        }
        
        function clearMemory() {
            memory = [];
            updateMemoryDisplay();
            document.getElementById('result').innerHTML = '🗑️ Память очищена';
            document.getElementById('display').innerHTML = '🗑️ Память очищена';
        }
        
        function setTheme(themeName) {
            document.body.classList.remove('theme-light', 'theme-dark', 'theme-blue', 'theme-pink');
            document.body.classList.add(`theme-${themeName}`);
            
            let themeNames = {
                'light': '☀️ Светлая тема',
                'dark': '🌙 Тёмная тема',
                'blue': '💙 Синяя тема',
                'pink': '💗 Розовая тема'
            };
            document.getElementById('display').innerHTML = themeNames[themeName];
            
            setTimeout(() => {
                if (document.getElementById('result').innerHTML === 'Результат: —') {
                    document.getElementById('display').innerHTML = '✨ Готов к работе';
                }
            }, 1500);
        }
    </script>
</body>
</html>
