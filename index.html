<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Калькулятор</title>
    <style>
        * {
            transition: all 0.3s ease;
        }
        
        /* Светлая тема (по умолчанию) */
        body {
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }
        
        .calculator {
            background: white;
            border-radius: 20px;
            padding: 25px;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin: 0 0 20px 0;
        }
        
        input {
            width: calc(50% - 12px);
            padding: 12px;
            margin: 5px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        
        button {
            padding: 15px;
            font-size: 18px;
            background: #e0e0e0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        
        button:hover {
            background: #d0d0d0;
            transform: scale(1.02);
        }
        
        .result {
            margin-top: 15px;
            padding: 12px;
            background: #e94560;
            color: white;
            border-radius: 10px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }
        
        .clear-btn {
            width: 100%;
            margin-top: 10px;
            background: #ff6b6b;
            color: white;
        }
        
        .clear-btn:hover {
            background: #ff5252;
        }
        
        /* Стили для блока памяти */
        .memory-panel {
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 10px;
            border: 1px solid #eee;
        }
        
        .memory-panel h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #666;
        }
        
        .memory-list {
            min-height: 50px;
            max-height: 150px;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        
        .memory-item {
            background: white;
            padding: 8px;
            margin: 5px 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            border: 1px solid #eee;
        }
        
        .memory-item button {
            padding: 5px 10px;
            font-size: 12px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .memory-item button:hover {
            background: #c73550;
        }
        
        .save-memory-btn {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .save-memory-btn:hover {
            background: #45a049;
        }
        
        .clear-memory-btn {
            width: 100%;
            margin-top: 8px;
            padding: 8px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .clear-memory-btn:hover {
            background: #ff5252;
        }
        
        /* Тёмная тема (Шаг 14) */
        body.d


ark {
            background: #1a1a2e;
        }
        
        body.dark .calculator {
            background: #16213e;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        body.dark h1 {
            color: #e0e0e0;
        }
        
        body.dark input {
            background: #0f3460;
            color: white;
            border-color: #e94560;
        }
        
        body.dark input::placeholder {
            color: #aaa;
        }
        
        body.dark .buttons button {
            background: #0f3460;
            color: white;
        }
        
        body.dark .buttons button:hover {
            background: #e94560;
        }
        
        body.dark .result {
            background: #e94560;
        }
        
        body.dark .memory-panel {
            background: #0f3460;
            border-color: #e94560;
        }
        
        body.dark .memory-panel h3 {
            color: #ccc;
        }
        
        body.dark .memory-item {
            background: #1a1a2e;
            color: white;
            border-color: #e94560;
        }
        
        .theme-btn {
            width: 100%;
            margin-bottom: 15px;
            padding: 10px;
            background: #4a4a4a;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .theme-btn:hover {
            background: #e94560;
            transform: scale(1.02);
        }
        
        body.dark .theme-btn {
            background: #e94560;
        }
        
        body.dark .theme-btn:hover {
            background: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>🧮 Умный калькулятор</h1>
        
        <!-- Кнопка тёмной темы (Шаг 14) -->
        <button class="theme-btn" onclick="toggleTheme()">🌙 Включить тёмную тему</button>
        
        <input type="number" id="num1" placeholder="Первое число">
        <input type="number" id="num2" placeholder="Второе число">
        
        <div class="buttons">
            <button onclick="calculate('+')">+</button>
            <button onclick="calculate('-')">-</button>
            <button onclick="calculate('*')">×</button>
            <button onclick="calculate('/')">÷</button>
        </div>
        
        <button class="clear-btn" onclick="clearAll()">🗑️ Очистить всё</button>
        
        <div class="result" id="result">Результат: —</div>
        
        <!-- Блок памяти -->
        <div class="memory-panel">
            <h3>📌 Сохранённые результаты</h3>
            <div class="memory-list" id="memoryList">
                <div style="color: #999; text-align: center;">Пока пусто</div>
            </div>
            <button class="save-memory-btn" onclick="saveToMemory()">💾 Запомнить результат</button>
            <button class="clear-memory-btn" onclick="clearMemory()">🗑️ Очистить всю память</button>
        </div>
    </div>

    <script>
        // Массив для хранения результатов с объектами {value, time}
        let memory = [];
        
        function calculate(op) {
            let a = parseFloat(document.getElementById('num1').value);
            let b = parseFloat(document.getElementById('num2').value);
            let res;
            let operationText = '';
            
            // Проверка на пустые поля
            if (isNaN(a) || isNaN(b)) {
                document.getElementById('result').innerHTML = '❌ Ошибка: введите оба числа!';
                return;
            }
            
            // Проверка на деление на ноль
            if (op === '/' && b === 0) {
                document.getElementById('result').innerHTML = '❌ Ошибка: деление на ноль!';
                return;
            }
            
            if (op === '+') { res = a + b; operationText = 'сложение'; }
            if (op === '-') { res = a - b; operationText = 'вычитание'; }
            if (op


=== '*') { res = a * b; operationText = 'умножение'; }
            if (op === '/') { res = a / b; operationText = 'деление'; }
            
            document.getElementById('result').innerHTML = `✅ Результат (${operationText}): ${res}`;
        }
        
        function clearAll() {
            document.getElementById('num1').value = '';
            document.getElementById('num2').value = '';
            document.getElementById('result').innerHTML = 'Результат: —';
        }
        
        // Функция сохранения в память
        function saveToMemory() {
            let resultText = document.getElementById('result').innerHTML;
            let match = resultText.match(/\d+\.?\d*/);
            
            if (match && resultText !== 'Результат: —' && !resultText.includes('Ошибка') && !resultText.includes('сохранён')) {
                let value = parseFloat(match[0]);
                let now = new Date();
                let timeString = now.toLocaleTimeString();
                
                memory.push({
                    value: value,
                    time: timeString
                });
                
                document.getElementById('result').innerHTML = `💾 Результат ${value} сохранён в память (${timeString})!`;
                updateMemoryDisplay();
            } else if (resultText.includes('Ошибка')) {
                document.getElementById('result').innerHTML = '❌ Нельзя сохранить ошибку! Сначала получите корректный результат.';
            } else if (resultText.includes('сохранён')) {
                document.getElementById('result').innerHTML = '❌ Нельзя сохранить одно и то же дважды! Вычислите что-то новое.';
            } else {
                document.getElementById('result').innerHTML = '❌ Нет результата для сохранения. Сначала что-нибудь вычислите!';
            }
        }
        
        // Функция обновления списка памяти
        function updateMemoryDisplay() {
            let container = document.getElementById('memoryList');
            
            if (memory.length === 0) {
                container.innerHTML = '<div style="color: #999; text-align: center;">Пока пусто</div>';
                return;
            }
            
            container.innerHTML = '';
            for (let i = 0; i < memory.length; i++) {
                let item = document.createElement('div');
                item.className = 'memory-item';
                item.innerHTML = `
                    <span>📊 ${memory[i].value} (${memory[i].time})</span>
                    <button onclick="useMemoryItem(${i})">Использовать</button>
                `;
                container.appendChild(item);
            }
        }
        
        // Функция использования сохранённого числа
        function useMemoryItem(index) {
            let val = memory[index].value;
            document.getElementById('result').innerHTML = `📋 Использовано значение из памяти: ${val}`;
            document.getElementById('result').style.background = '#4CAF50';
            setTimeout(() => {
                if (document.body.classList.contains('dark')) {
                    document.getElementById('result').style.background = '#e94560';
                } else {
                    document.getElementById('result').style.background = '#e94560';
                }
            }, 1000);
        }
        
        // Функция очистки всей памяти
        function clearMemory() {
            memory = [];
            updateMemoryDisplay();
            document.getElementById('result').innerHTML = '🗑️ Память полностью очищена';
        }
        
        // Функция переключения тёмной темы (Шаг 14)
        function toggleTheme() {
            let body = document.body;
            let btn = document.querySelector('.theme-btn');
            body.classList.toggle('dark');
            
            if (body.classList.contains('dark')) {
                btn.innerHTML = '☀️ Включить светлую тему';
            } else {
                btn.inne


rHTML = '🌙 Включить тёмную тему';
            }
        }
    </script>
</body>
</html>
