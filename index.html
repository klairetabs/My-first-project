<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Калькулятор</title>
    <style>
        body { font-family: Arial; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f5f5f5; }
        .calculator { background: white; border-radius: 20px; padding: 25px; width: 350px; }
        h1 { text-align: center; color: #333; }
        input { width: calc(50% - 12px); padding: 12px; margin: 5px; border-radius: 8px; border: 1px solid #ddd; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }
        button { padding: 15px; font-size: 18px; background: #e0e0e0; border: none; border-radius: 10px; cursor: pointer; }
        button:hover { background: #d0d0d0; }
        .result { margin-top: 15px; padding: 12px; background: #e94560; color: white; border-radius: 10px; text-align: center; font-size: 18px; font-weight: bold; }
        .clear-btn { width: 100%; margin-top: 10px; background: #ff6b6b; color: white; }
        .clear-btn:hover { background: #ff5252; }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>🧮 Умный калькулятор</h1>
        
        <input type="number" id="num1" placeholder="Первое число">
        <input type="number" id="num2" placeholder="Второе число">
        
        <div class="buttons">
            <button onclick="calculate('+')">+</button>
            <button onclick="calculate('-')">-</button>
            <button onclick="calculate('*')">×</button>
            <button onclick="calculate('/')">÷</button>
        </div>
        
        <button class="clear-btn" onclick="clearAll()">🗑️ Очистить всё</button>
        
        <div class="result" id="result">Результат: —</div>
    </div>

    <script>
        function calculate(op) {
            let a = parseFloat(document.getElementById('num1').value);
            let b = parseFloat(document.getElementById('num2').value);
            let res;
            let operationText = '';
            
            // Проверка на пустые поля
            if (isNaN(a) || isNaN(b)) {
                document.getElementById('result').innerHTML = '❌ Ошибка: введите оба числа!';
                return;
            }
            
            // Проверка на деление на ноль
            if (op === '/' && b === 0) {
                document.getElementById('result').innerHTML = '❌ Ошибка: деление на ноль!';
                return;
            }
            
            if (op === '+') { res = a + b; operationText = 'сложение'; }
            if (op === '-') { res = a - b; operationText = 'вычитание'; }
            if (op === '*') { res = a * b; operationText = 'умножение'; }
            if (op === '/') { res = a / b; operationText = 'деление'; }
            
            document.getElementById('result').innerHTML = `✅ Результат (${operationText}): ${res}`;
        }
        
        function clearAll() {
            document.getElementById('num1').value = '';
            document.getElementById('num2').value = '';
            document.getElementById('result').innerHTML = 'Результат: —';
        }
    </script>
</body>
</html>
