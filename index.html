<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Калькулятор</title>
    <style>
        body { font-family: Arial; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f5f5f5; }
        .calculator { background: white; border-radius: 20px; padding: 25px; width: 350px; }
        h1 { text-align: center; color: #333; }
        input { width: calc(50% - 12px); padding: 12px; margin: 5px; border-radius: 8px; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }
        button { padding: 15px; background: #e0e0e0; border: none; border-radius: 10px; cursor: pointer; }
        .result { margin-top: 15px; padding: 12px; background: #e94560; color: white; border-radius: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>🧮 Умный калькулятор</h1>
        
        <input type="number" id="num1" placeholder="Первое число">
        <input type="number" id="num2" placeholder="Второе число">
        
        <div class="buttons">
            <button onclick="calculate('+')">+</button>
            <button onclick="calculate('-')">-</button>
            <button onclick="calculate('*')">×</button>
            <button onclick="calculate('/')">÷</button>
        </div>
        
        <button onclick="clearAll()">Очистить</button>
        
        <div class="result" id="result">Результат: —</div>
    </div>

    <script>
        // Здесь пока пусто, функция будет добавлена в Шаге 8
    </script>
</body>
</html>
