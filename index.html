<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Умный калькулятор - Цветные темы</title>
    <style>
        * {
            transition: all 0.3s ease;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        
        .calculator {
            border-radius: 20px;
            padding: 25px;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        h1 {
            text-align: center;
            margin: 0 0 20px 0;
            font-size: 24px;
        }
        
        .display {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            font-family: monospace;
            letter-spacing: 1px;
        }
        
        input {
            width: calc(50% - 12px);
            padding: 12px;
            margin: 5px;
            border-radius: 8px;
            border: 1px solid;
            font-size: 16px;
            box-sizing: border-box;
        }
        
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        
        button {
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        
        button:hover {
            transform: scale(1.02);
            filter: brightness(0.95);
        }
        
        .result {
            margin-top: 15px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }
        
        .clear-btn {
            width: 100%;
            margin-top: 10px;
        }
        
        .memory-panel {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
        }
        
        .memory-panel h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
        }
        
        .memory-list {
            min-height: 50px;
            max-height: 150px;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        
        .memory-item {
            padding: 8px;
            margin: 5px 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }
        
        .memory-item button {
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .save-memory-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .clear-memory-btn {
            width: 100%;
            margin-top: 8px;
            padding: 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }
        
        /* Панель выбора темы */
        .theme-panel {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        
        .theme-option {
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        
        .theme-option:hover {
            transform: scale(1.05);
        }
        
        /* ========== ТЕМА 1: СВЕТЛАЯ (по умолчанию) ========== */
        body.theme-light {
            background: #f5f5f5;
        }
        body.theme-light .calculator {
            background: white;
        }
        body.theme-light h1 {
            color: #333;
        }
        body.theme-light .display {
            background: #f0f0f0;
            color: #e94560;
        }
        body.theme-light input {
            background: white;
            color: #333;
            border-color: #ddd;
        }
        body.theme-light input::placeholder {
            color: #aaa;
        }
        body.theme-light button {
            background: #e0e0e0;
            color: #333;
        }
        body.theme-light .result {
            background: #e94560;
            color: white;
        }
        body.theme-light .clear-btn {
            background: #ff6b6b;
            color: white;
        }
        body.theme-light .memory-panel {
            background: #f9f9f9;
            border: 1px solid #eee;
        }
        body.theme-light .memory-panel h3 {
            color: #666;
        }
        body.theme-light .memory-item {
            background: white;
            border: 1px solid #eee;
            color: #333;
        }
        body.theme-light .memory-item button {
            background: #e94560;
            color: white;
        }
        body.theme-light .save-memory-btn {
            background: #4CAF50;
            color: white;
        }
        body.theme-light .clear-memory-btn {
            background: #ff6b6b;
            color: white;
        }
        
        /* ========== ТЕМА 2: ТЁМНАЯ ========== */
        body.theme-dark {
            background: #1a1a2e;
        }
        body.theme-dark .calculator {
            background: #16213e;
        }
        body.theme-dark h1 {
            color: #e0e0e0;
        }
        body.theme-dark .display {
            background: #0f3460;
            color: #e94560;
        }
        body.theme-dark input {
            background: #0f3460;
            color: white;
            border-color: #e94560;
        }
        body.theme-dark input::placeholder {
            color: #aaa;
        }
        body.theme-dark button {
            background: #0f3460;
            color: white;
        }
        body.theme-dark .result {
            background: #e94560;
            color: white;
        }
        body.theme-dark .clear-btn {
            background: #ff6b6b;
            color: white;
        }
        body.theme-dark .memory-panel {
            background: #0f3460;
            border: 1px solid #e94560;
        }
        body.theme-dark .memory-panel h3 {
            color: #ccc;
        }
        body.theme-dark .memory-item {
            background: #1a1a2e;
            border: 1px solid #e94560;
            color: white;
        }
        body.theme-dark .memory-item button {
            background: #e94560;
            color: white;
        }
        body.theme-dark .save-memory-btn {
            background: #4CAF50;
            color: white;
        }
        body.theme-dark .clear-memory-btn {
            background: #ff6b6b;
            color: white;
        }
        
        /* ========== ТЕМА 3: СИНЯЯ ========== */
        body.theme-blue {
            background: #e3f2fd;
        }
        body.theme-blue .calculator {
            background: #bbdef5;
        }
        body.theme-blue h1 {
            color: #0d47a1;
        }
        body.theme-blue .display {
            background: #1976d2;
            color: white;
        }
        body.theme-blue input {
            background: white;
            color: #0d47a1;
            border-color: #1976d2;
        }
        body.theme-blue input::placeholder {
            color: #64b5f6;
        }
        body.theme-blue button {
            background: #1976d2;
            color: white;
        }
        body.theme-blue .result {
            background: #0d47a1;
            color: white;
        }
        body.theme-blue .clear-btn {
            background: #1565c0;
            color: white;
        }
        body.theme-blue .memory-panel {
            background: #e3f2fd;
            border: 1px solid #1976d2;
        }
        body.theme-blue .memory-panel h3 {
            color: #0d47a1;
        }
        body.theme-blue .memory-item {
            background: white;
            border: 1px solid #1976d2;
            color: #0d47a1;
        }
        body.theme-blue .memory-item button {
            background: #1976d2;
            color: white;
        }
        body.theme-blue .save-memory-btn {
            background: #0d47a1;
            color: white;
        }
        body.theme-blue .clear-memory-btn {
            background: #1565c0;
            color: white;
        }
        
        /* ========== ТЕМА 4: РОЗОВАЯ ========== */
        body.theme-pink {
            background: #fce4ec;
        }
        body.theme-pink .calculator {
            background: #f8bbd0;
        }
        body.theme-pink h1 {
            color: #880e4f;
        }
        body.theme-pink .display {
            background: #e91e63;
            color: white;
        }
        body.theme-pink input {
            background: white;
            color: #880e4f;
            border-color: #e91e63;
        }
        body.theme-pink input::placeholder {
            color: #f06292;
        }
        body.theme-pink button {
            background: #e91e63;
            color: white;
        }
        body.theme-pink .result {
            background: #880e4f;
            color: white;
        }
        body.theme-pink .clear-btn {
            background: #c2185b;
            color: white;
        }
        body.theme-pink .memory-panel {
            background: #fce4ec;
            border: 1px solid #e91e63;
        }
        body.theme-pink .memory-panel h3 {
            color: #880e4f;
        }
        body.theme-pink .memory-item {
            background: white;
            border: 1px solid #e91e63;
            color: #880e4f;
        }
        body.theme-pink .memory-item button {
            background: #e91e63;
            color: white;
        }
        body.theme-pink .save-memory-btn {
            background: #880e4f;
            color: white;
        }
        body.theme-pink .clear-memory-btn {
            background: #c2185b;
            color: white;
        }
    </style>
</head>
<body class="theme-light">
    <div class="calculator">
        <h1>🧮 Умный калькулятор</h1>
        
        <!-- Панель выбора темы (4 варианта) -->
        <div class="theme-panel">
            <div class="theme-option" style="background: #f5f5f5; color: #333; border-color: #ddd;" onclick="setTheme('light')">☀️ Светлая</div>
            <div class="theme-option" style="background: #1a1a2e; color: white; border-color: #e94560;" onclick="setTheme('dark')">🌙 Тёмная</div>
            <div class="theme-option" style="background: #1976d2; color: white; border-color: #0d47a1;" onclick="setTheme('blue')">💙 Синяя</div>
            <div class="theme-option" style="background: #e91e63; color: white; border-color: #880e4f;" onclick="setTheme('pink')">💗 Розовая</div>
        </div>
        
        <div class="display" id="display">✨ Готов к работе</div>
        
        <input type="number" id="num1" placeholder="Первое число">
        <input type="number" id="num2" placeholder="Второе число">
        
        <div class="buttons">
            <button onclick="calculate('+')">+</button>
            <button onclick="calculate('-')">-</button>
            <button onclick="calculate('*')">×</button>
            <button onclick="calculate('/')">÷</button>
        </div>
        
        <button class="clear-btn" onclick="clearAll()">🗑️ Очистить всё</button>
        
        <div class="result" id="result">Результат: —</div>
        
        <div class="memory-panel">
            <h3>📌 Сохранённые результаты</h3>
            <div class="memory-list" id="memoryList">
                <div style="color: #999; text-align: center;">Пока пусто</div>
            </div>
            <button class="save-memory-btn" onclick="saveToMemory()">💾 Запомнить результат</button>
            <button class="clear-memory-btn" onclick="clearMemory()">🗑️ Очистить всю память</button>
        </div>
    </div>

    <script>
        let memory = [];
        
        function calculate(op) {
            let a = parseFloat(document.getElementById('num1').value);
            let b = parseFloat(document.getElementById('num2').value);
            let res;
            let operationText = '';
            let operationSymbol = '';
            
            if (isNaN(a) || isNaN(b)) {
                document.getElementById('result').innerHTML = '❌ Ошибка: введите оба числа!';
                document.getElementById('display').innerHTML = '⚠️ Ошибка ввода';
                return;
            }
            
            if (op === '/' && b === 0) {
                document.getElementById('result').innerHTML = '❌ Ошибка: деление на ноль!';
                document.getElementById('display').innerHTML = '⛔ Деление на 0 запрещено';
                return;
            }
            
            if (op === '+') { res = a + b; operationText = 'сложение'; operationSymbol = '+'; }
            if (op === '-') { res = a - b; operationText = 'вычитание'; operationSymbol = '-'; }
            if (op === '*') { res = a * b; operationText = 'умножение'; operationSymbol = '×'; }
            if (op === '/') { res = a / b; operationText = 'деление'; operationSymbol = '÷'; }
            
            document.getElementById('display').innerHTML = `${a} ${operationSymbol} ${b} = ${res}`;
            document.getElementById('result').innerHTML = `✅ Результат (${operationText}): ${res}`;
        }
        
        function clearAll() {
            document.getElementById('num1').value = '';
            document.getElementById('num2').value = '';
            document.getElementById('result').innerHTML = 'Результат: —';
            document.getElementById('display').innerHTML = '✨ Готов к работе';
        }
        
        function saveToMemory() {
            let resultText = document.getElementById('result').innerHTML;
            let match = resultText.match(/\d+\.?\d*/);
            
            if (match && resultText !== 'Результат: —' && !resultText.includes('Ошибка') && !resultText.includes('сохранён')) {
                let value = parseFloat(match[0]);
                let now = new Date();
                let timeString = now.toLocaleTimeString();
                
                memory.push({
                    value: value,
                    time: timeString
                });
                
                document.getElementById('result').innerHTML = `💾 Результат ${value} сохранён в память (${timeString})!`;
                document.getElementById('display').innerHTML = `📌 Сохранено: ${value}`;
                updateMemoryDisplay();
            } else if (resultText.includes('Ошибка')) {
                document.getElementById('result').innerHTML = '❌ Нельзя сохранить ошибку!';
                document.getElementById('display').innerHTML = '⚠️ Нельзя сохранить ошибку';
            } else {
                document.getElementById('result').innerHTML = '❌ Нет результата для сохранения!';
                document.getElementById('display').innerHTML = '❌ Нет результата';
            }
        }
        
        function updateMemoryDisplay() {
            let container = document.getElementById('memoryList');
            
            if (memory.length === 0) {
                container.innerHTML = '<div style="text-align: center;">Пока пусто</div>';
                return;
            }
            
            container.innerHTML = '';
            for (let i = 0; i < memory.length; i++) {
                let item = document.createElement('div');
                item.className = 'memory-item';
                item.innerHTML = `
                    <span>📊 ${memory[i].value} (${memory[i].time})</span>
                    <button onclick="useMemoryItem(${i})">Использовать</button>
                `;
                container.appendChild(item);
            }
        }
        
        function useMemoryItem(index) {
            let val = memory[index].value;
            document.getElementById('result').innerHTML = `📋 Использовано: ${val}`;
            document.getElementById('display').innerHTML = `📋 Загружено: ${val}`;
        }
        
        function clearMemory() {
            memory = [];
            updateMemoryDisplay();
            document.getElementById('result').innerHTML = '🗑️ Память очищена';
            document.getElementById('display').innerHTML = '🗑️ Память очищена';
        }
        
        function setTheme(themeName) {
            document.body.classList.remove('theme-light', 'theme-dark', 'theme-blue', 'theme-pink');
            document.body.classList.add(`theme-${themeName}`);
            
            let themeNames = {
                'light': '☀️ Светлая тема',
                'dark': '🌙 Тёмная тема',
                'blue': '💙 Синяя тема',
                'pink': '💗 Розовая тема'
            };
            document.getElementById('display').innerHTML = themeNames[themeName];
            
            setTimeout(() => {
                if (document.getElementById('result').innerHTML === 'Результат: —') {
                    document.getElementById('display').innerHTML = '✨ Готов к работе';
                }
            }, 1500);
        }
    </script>
</body>
</html>
